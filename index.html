<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Plast - نظام إدارة المخزن المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; color: #334155; }
        .nav-btn.active { background: #1e293b; color: white; transform: translateY(-2px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Navigation -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg">DP</div>
                <div>
                    <h1 class="text-xl font-black leading-none">Diamond Plast</h1>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">تجهيز الطلبيات والمخازن</span>
                </div>
            </div>
            <div class="flex bg-slate-100 p-1.5 rounded-2xl gap-2">
                <button onclick="showPage('home')" id="btn-home" class="nav-btn active px-8 py-2.5 rounded-xl font-black text-sm transition-all shadow-lg">الرئيسية</button>
                <button onclick="showPage('sheets')" id="btn-sheets" class="nav-btn px-8 py-2.5 rounded-xl font-black text-sm text-slate-500 transition-all">المستودع</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">

        <!-- PAGE: HOME -->
        <div id="page-home" class="space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <!-- Search & Order Preparation -->
                <div class="lg:col-span-8 bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100 flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-2xl font-black flex items-center gap-2"><span>🔍</span> تجهيز الطلبية والبحث</h3>
                        <div class="flex gap-4">
                            <div class="bg-blue-50 px-4 py-2 rounded-2xl border border-blue-100 text-center">
                                <span class="text-[10px] font-black text-blue-400 block uppercase">إجمالي الوزن (كجم)</span>
                                <span id="grand-total-weight" class="text-xl font-black text-blue-700">0.000</span>
                            </div>
                            <div class="bg-slate-50 px-4 py-2 rounded-2xl border border-slate-100 text-center">
                                <span class="text-[10px] font-black text-slate-400 block uppercase">إجمالي القوالب</span>
                                <input type="number" id="manual-total-count" value="0" class="w-16 bg-transparent text-xl font-black text-slate-700 text-center outline-none border-b border-transparent focus:border-slate-300">
                            </div>
                        </div>
                    </div>
                    
                    <textarea id="home-bulk" oninput="updateHomeSearch()" placeholder="أدخل الأكواد هنا (كود في كل سطر).." class="w-full h-32 p-4 rounded-3xl bg-slate-50 border-none font-bold mb-6 outline-none focus:ring-2 focus:ring-slate-200 transition-all"></textarea>
                    
                    <div id="home-results" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Results injected here -->
                    </div>
                </div>

                <!-- Operations Panel (Add & Remove) -->
                <div class="lg:col-span-4 space-y-6">
                    <!-- التوريد -->
                    <div class="bg-slate-900 text-white rounded-[2.5rem] p-8 shadow-xl border border-slate-700">
                        <h3 class="font-black text-xl mb-4 flex items-center gap-2"><span>📥</span> توريد للمخزن</h3>
                        <div class="space-y-3">
                            <input type="text" id="add-c" placeholder="كود المنتج" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none placeholder:text-white/30">
                            <input type="number" id="add-q" placeholder="الكمية" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none placeholder:text-white/30">
                            <button onclick="invAction('add')" class="w-full bg-white text-black p-4 rounded-2xl font-black hover:bg-slate-100 transition-all active:scale-95 shadow-lg">إضافة للرصيد</button>
                        </div>
                    </div>

                    <!-- الصرف -->
                    <div class="bg-red-600 text-white rounded-[2.5rem] p-8 shadow-xl border border-red-500">
                        <h3 class="font-black text-xl mb-4 flex items-center gap-2"><span>📤</span> صرف من المخزن</h3>
                        <div class="space-y-3">
                            <input type="text" id="sub-c" placeholder="كود المنتج" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none placeholder:text-white/30">
                            <input type="number" id="sub-q" placeholder="الكمية" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none placeholder:text-white/30">
                            <button onclick="invAction('sub')" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black hover:bg-black transition-all active:scale-95 shadow-lg">خصم من الرصيد</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- PAGE: SHEETS -->
        <div id="page-sheets" class="hidden animate-in fade-in duration-500">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                <div id="sheet-tabs" class="flex gap-2 overflow-x-auto p-2 no-scrollbar w-full md:w-auto"></div>
                <div class="flex gap-2">
                    <button onclick="exportData()" class="bg-emerald-600 text-white px-6 py-3 rounded-2xl font-black text-sm shadow-lg hover:bg-emerald-700 transition-all flex items-center gap-2">
                        <span>📥</span> تصدير Excel
                    </button>
                    <label class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-sm shadow-lg hover:bg-blue-700 transition-all cursor-pointer flex items-center gap-2">
                        <span>📤</span> استيراد
                        <input type="file" id="import-file" class="hidden" onchange="importData(event)">
                    </label>
                </div>
            </div>
            
            <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100">
                <div class="overflow-x-auto">
                    <table class="w-full text-right">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 text-xs font-black uppercase tracking-widest">
                                <th class="p-6 text-center">الكود</th>
                                <th class="p-6 text-center">الرصيد المتاح</th>
                                <th class="p-6 text-center">الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="sheet-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-10 translate-y-20 opacity-0 transition-all duration-500 z-[100] bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl font-black"></div>

    <script>
        const CATS = ['T', 'S', 'C', 'G', 'R', 'E', 'YG', 'YT', 'YE', 'YR', 'YC', 'YS', 'MG'];
        
        // قاعدة بيانات أوزان القوالب الافتراضية
        const weightDatabase = {
            "T-7000": 379, "T-7001": 406, "S-4018": 394, "C-5001": 466, "G-8000": 542
        };

        let inventory = JSON.parse(localStorage.getItem('dp_v4_inv')) || {};
        let orderQuantities = {}; 
        let currentTab = 'T';

        if (Object.keys(inventory).length === 0) CATS.forEach(c => inventory[c] = []);

        function showPage(p) {
            ['home', 'sheets'].forEach(page => {
                document.getElementById(`page-${page}`).classList.toggle('hidden', page !== p);
                const btn = document.getElementById(`btn-${page}`);
                if(btn) btn.className = (page === p) ? 'nav-btn active px-8 py-2.5 rounded-xl font-black text-sm transition-all shadow-lg' : 'nav-btn px-8 py-2.5 rounded-xl font-black text-sm text-slate-500 transition-all';
            });
            if(p === 'sheets') renderSheets();
        }

        function find(c) {
            for(let cat in inventory) {
                const i = inventory[cat].find(x => x.code === c);
                if(i) return { ...i, cat };
            }
            return null;
        }

        function invAction(type) {
            const prefix = type === 'add' ? 'add' : 'sub';
            const c = document.getElementById(`${prefix}-c`).value.toUpperCase().trim();
            const q = parseFloat(document.getElementById(`${prefix}-q`).value);
            
            if(!c || isNaN(q)) return showToast("يرجى إدخال الكود والكمية", "error");

            let targetCat = "";
            const info = find(c);
            if(info) {
                targetCat = info.cat;
                const item = inventory[info.cat].find(x => x.code === c);
                if(type === 'sub' && item.base < q) return showToast("الرصيد غير كافٍ!", "error");
                item.base += (type === 'add' ? q : -q);
            } else {
                if(type === 'sub') return showToast("الكود غير موجود للخصم", "error");
                targetCat = CATS.includes(c.charAt(0)) ? c.charAt(0) : 'MG';
                inventory[targetCat].push({ code: c, base: q });
            }
            
            save();
            document.getElementById(`${prefix}-c`).value = '';
            document.getElementById(`${prefix}-q`).value = '';
            showToast(type === 'add' ? `تمت الإضافة بنجاح في قسم (${targetCat})` : `تم الخصم من قسم (${targetCat})`);
            updateHomeSearch();
        }

        function updateOrderQty(code, qty) {
            orderQuantities[code] = parseFloat(qty) || 0;
            calculateGrandTotal();
        }

        function calculateGrandTotal() {
            let totalWeightGm = 0;
            let totalItemsCount = 0;
            const codesInSearch = document.getElementById('home-bulk').value.toUpperCase().split('\n').map(l=>l.trim()).filter(l=>l!=='');

            codesInSearch.forEach(c => {
                const qty = orderQuantities[c] || 0;
                const weightPerUnit = weightDatabase[c] || 400; 
                totalWeightGm += (qty * weightPerUnit);
                totalItemsCount += qty;
            });

            document.getElementById('grand-total-weight').innerText = (totalWeightGm / 1000).toFixed(3);
            const manualTotal = document.getElementById('manual-total-count');
            // تحديث تلقائي فقط إذا كان الصفر، للسماح بالتحكم اليدوي
            if (totalItemsCount > 0) manualTotal.value = totalItemsCount;
        }

        function updateHomeSearch() {
            const raw = document.getElementById('home-bulk').value.toUpperCase();
            const codes = [...new Set(raw.split('\n').map(l => l.trim()).filter(l => l !== ''))];
            const res = document.getElementById('home-results');
            res.innerHTML = '';

            codes.forEach(c => {
                const info = find(c);
                const unitWeight = weightDatabase[c] || 400; 
                if(!orderQuantities[c]) orderQuantities[c] = 0;

                const div = document.createElement('div');
                div.className = "p-6 bg-slate-50 rounded-3xl border border-slate-100 flex flex-col gap-4 transition-all hover:bg-white hover:shadow-md";
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="text-xl font-black text-slate-800">${c}</div>
                            <div class="text-[10px] font-bold text-slate-400">الرصيد: ${info ? info.base : 0} | القسم: ${info ? info.cat : 'جديد'}</div>
                        </div>
                        <div class="bg-white px-3 py-1 rounded-full border border-slate-200 text-[10px] font-bold text-slate-500">
                            وزن: ${unitWeight} جم
                        </div>
                    </div>
                    <div class="flex items-center gap-4 bg-white/50 p-3 rounded-2xl border border-slate-100">
                        <div class="flex-1">
                            <label class="text-[10px] font-black text-slate-400 block mb-1">العدد المطلوب</label>
                            <input type="number" value="${orderQuantities[c]}" 
                                   oninput="updateOrderQty('${c}', this.value)"
                                   placeholder="0"
                                   class="w-full bg-slate-50 p-2 rounded-xl border-none font-black outline-none focus:ring-2 focus:ring-blue-400">
                        </div>
                        <div class="text-left min-w-[80px]">
                            <label class="text-[10px] font-black text-slate-400 block mb-1 text-left">وزن الصنف</label>
                            <div class="font-black text-blue-600">${((orderQuantities[c] * unitWeight) / 1000).toFixed(3)} كجم</div>
                        </div>
                    </div>
                `;
                res.appendChild(div);
            });
            calculateGrandTotal();
        }

        function renderSheets() {
            const tabs = document.getElementById('sheet-tabs');
            tabs.innerHTML = CATS.map(c => `
                <button onclick="currentTab='${c}'; renderSheets()" 
                        class="px-8 py-3 rounded-2xl font-black whitespace-nowrap transition-all ${currentTab === c ? 'bg-slate-900 text-white shadow-xl scale-105' : 'bg-white text-slate-400 hover:bg-slate-50'}">
                    ${c}
                </button>
            `).join('');
            
            const body = document.getElementById('sheet-body');
            body.innerHTML = (inventory[currentTab] && inventory[currentTab].length > 0) ? inventory[currentTab].map(item => `
                <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-all">
                    <td class="p-6 font-black text-center text-lg">${item.code}</td>
                    <td class="p-6 text-center font-bold text-blue-600 text-lg">${item.base}</td>
                    <td class="p-6 text-center">
                        <button onclick="deleteCode('${item.code}')" class="w-10 h-10 bg-red-50 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all">🗑️</button>
                    </td>
                </tr>
            `).join('') : `<tr><td colspan="3" class="p-20 text-center text-slate-300 font-bold italic">لا توجد أكواد مسجلة في هذا القسم حالياً</td></tr>`;
        }

        function deleteCode(c) {
            if(confirm(`هل أنت متأكد من حذف الكود ${c} نهائياً؟`)) {
                for(let cat in inventory) {
                    inventory[cat] = inventory[cat].filter(x => x.code !== c);
                }
                save();
                renderSheets();
                showToast("تم الحذف بنجاح");
            }
        }

        // ميزات الاستيراد والتصدير
        function exportData() {
            const dataStr = JSON.stringify(inventory, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `Diamond_Plast_Inventory_${new Date().toLocaleDateString()}.json`;
            a.click();
            showToast("تم تصدير ملف البيانات بنجاح");
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    // التحقق من صحة الملف بشكل بسيط
                    if (typeof imported === 'object' && !Array.isArray(imported)) {
                        inventory = imported;
                        save();
                        renderSheets();
                        showToast("تم استيراد البيانات بنجاح");
                    } else {
                        showToast("ملف غير صالح", "error");
                    }
                } catch (err) {
                    showToast("خطأ في قراءة الملف", "error");
                }
            };
            reader.readAsText(file);
        }

        function save() {
            localStorage.setItem('dp_v4_inv', JSON.stringify(inventory));
        }

        function showToast(m, t='success') {
            const el = document.getElementById('toast');
            el.innerText = m;
            el.className = `fixed bottom-10 left-10 transition-all duration-500 z-[100] px-8 py-4 rounded-2xl shadow-2xl font-black text-white ${t === 'success' ? 'bg-slate-900' : 'bg-red-600'} translate-y-0 opacity-100`;
            setTimeout(() => {
                el.classList.add('translate-y-20');
                el.classList.remove('opacity-100');
            }, 3500);
        }

        window.onload = () => {
            showPage('home');
        };
    </script>
</body>
</html>
