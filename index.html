window.showPage = (p) => {
    ['home', 'sheets', 'weights'].forEach(pg => {
        document.getElementById(`page-${pg}`).classList.toggle('hidden', pg !== p);

        document.getElementById(`btn-${pg}`).className =
            pg === p
            ? 'nav-btn active px-4 md:px-8 py-2.5 rounded-xl font-black transition-all shadow-lg'
            : 'nav-btn px-4 md:px-8 py-2.5 rounded-xl font-black text-slate-500 transition-all';
    });
};

window.handleBulkInput = () => {

    const lines = document.getElementById('home-bulk').value.trim().split('\n');

    orderItems = {};

    lines.forEach(l => {

        const p = l.split(/\t|\s+/);

        const c = p[0]?.toUpperCase();

        const q = parseFloat(p[1]);

        if(c && !isNaN(q)) {
            orderItems[c] = q;
        }

    });
