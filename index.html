<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Plast - نظام إدارة المخزن المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; color: #334155; }
        .nav-btn.active { background: #1e293b; color: white; transform: translateY(-2px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg">DP</div>
                <div>
                    <h1 class="text-xl font-black leading-none">Diamond Plast</h1>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">تجهيز الطلبيات والمخازن</span>
                </div>
            </div>
            <div class="flex bg-slate-100 p-1.5 rounded-2xl gap-2">
                <button onclick="showPage('home')" id="btn-home" class="nav-btn active px-8 py-2.5 rounded-xl font-black text-sm transition-all shadow-lg">الرئيسية</button>
                <button onclick="showPage('sheets')" id="btn-sheets" class="nav-btn px-8 py-2.5 rounded-xl font-black text-sm text-slate-500 transition-all">المستودع</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">

        <div id="page-home" class="space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <div class="lg:col-span-8 bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100 flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-2xl font-black flex items-center gap-2"><span>🔍</span> تجهيز الطلبية (نسخ/لصق)</h3>
                        <div class="flex gap-4">
                            <div class="bg-blue-50 px-4 py-2 rounded-2xl border border-blue-100 text-center">
                                <span class="text-[10px] font-black text-blue-400 block uppercase">إجمالي الوزن (كجم)</span>
                                <span id="grand-total-weight" class="text-xl font-black text-blue-700">0.000</span>
                            </div>
                        </div>
                    </div>
                    
                    <textarea id="home-bulk" oninput="handleBulkInput()" placeholder="أدخل الأكواد هنا.. (يمكنك لصق صفوف من إكسيل مباشرة كود + كمية)" class="w-full h-32 p-4 rounded-3xl bg-slate-50 border-none font-bold mb-6 outline-none focus:ring-2 focus:ring-slate-200 transition-all"></textarea>
                    
                    <div id="home-results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-slate-900 text-white rounded-[2.5rem] p-8 shadow-xl">
                        <h3 class="font-black text-xl mb-4 flex items-center gap-2"><span>📥</span> توريد / إضافة</h3>
                        <div class="space-y-3">
                            <input type="text" id="add-c" placeholder="كود المنتج" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none">
                            <input type="number" id="add-q" placeholder="الكمية" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none">
                            <button onclick="invAction('add')" class="w-full bg-white text-black p-4 rounded-2xl font-black hover:bg-slate-100 shadow-lg">تحديث الرصيد</button>
                        </div>
                    </div>
                    <div class="bg-red-600 text-white rounded-[2.5rem] p-8 shadow-xl">
                        <h3 class="font-black text-xl mb-4 flex items-center gap-2"><span>📤</span> صرف / خصم</h3>
                        <div class="space-y-3">
                            <input type="text" id="sub-c" placeholder="كود المنتج" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none">
                            <input type="number" id="sub-q" placeholder="الكمية" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none">
                            <button onclick="invAction('sub')" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black hover:bg-black shadow-lg">خصم من الرصيد</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-sheets" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                <div id="sheet-tabs" class="flex gap-2 overflow-x-auto p-2 no-scrollbar w-full md:w-auto"></div>
                <div class="flex gap-2">
                    <button onclick="exportToExcel()" class="bg-emerald-600 text-white px-6 py-3 rounded-2xl font-black text-sm shadow-lg hover:bg-emerald-700 transition-all flex items-center gap-2">
                        <span>📊</span> تصدير Excel (كل الأقسام)
                    </button>
                    <label class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-sm shadow-lg hover:bg-blue-700 transition-all cursor-pointer flex items-center gap-2">
                        <span>📥</span> استيراد من Excel
                        <input type="file" id="import-excel" class="hidden" accept=".xlsx, .xls" onchange="importFromExcel(event)">
                    </label>
                </div>
            </div>
            
            <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-xs font-black uppercase tracking-widest">
                            <th class="p-6 text-center">الكود</th>
                            <th class="p-6 text-center">الرصيد المتاح</th>
                            <th class="p-6 text-center">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="sheet-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-10 translate-y-20 opacity-0 transition-all duration-500 z-[100] bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl font-black"></div>

    <script>
        const CATS = ['T', 'S', 'C', 'G', 'R', 'E', 'YG', 'YT', 'YE', 'YR', 'YC', 'YS', 'MG'];
        const weightDatabase = { "T-7000": 379, "T-7001": 406, "S-4018": 394, "C-5001": 466, "G-8000": 542 };

        let inventory = JSON.parse(localStorage.getItem('dp_v4_inv')) || {};
        let orderQuantities = {}; 
        let currentTab = 'T';

        if (Object.keys(inventory).length === 0) CATS.forEach(c => inventory[c] = []);

        function showPage(p) {
            ['home', 'sheets'].forEach(page => {
                document.getElementById(`page-${page}`).classList.toggle('hidden', page !== p);
                const btn = document.getElementById(`btn-${page}`);
                if(btn) btn.className = (page === p) ? 'nav-btn active px-8 py-2.5 rounded-xl font-black text-sm shadow-lg' : 'nav-btn px-8 py-2.5 rounded-xl font-black text-sm text-slate-500 transition-all';
            });
            if(p === 'sheets') renderSheets();
        }

        function find(c) {
            for(let cat in inventory) {
                const i = inventory[cat].find(x => x.code === c);
                if(i) return { item: i, cat };
            }
            return null;
        }

        function invAction(type, codeParam = null, qtyParam = null) {
            const c = (codeParam || document.getElementById(`${type === 'add' ? 'add' : 'sub'}-c`).value).toUpperCase().trim();
            const q = parseFloat(qtyParam || document.getElementById(`${type === 'add' ? 'add' : 'sub'}-q`).value);
            
            if(!c || isNaN(q)) return;

            let info = find(c);
            if(info) {
                if(type === 'sub' && info.item.base < q) {
                    showToast(`الرصيد غير كافٍ للكود ${c}`, "error");
                    return;
                }
                info.item.base += (type === 'add' ? q : -q);
            } else {
                if(type === 'sub') return;
                let targetCat = CATS.includes(c.charAt(0)) ? c.charAt(0) : 'MG';
                inventory[targetCat].push({ code: c, base: q });
            }
            
            save();
            if(!codeParam) {
                document.getElementById(`${type === 'add' ? 'add' : 'sub'}-c`).value = '';
                document.getElementById(`${type === 'add' ? 'add' : 'sub'}-q`).value = '';
                showToast("تم تحديث الرصيد بنجاح");
            }
        }

        // --- الميزات الجديدة ---

        // 1. معالجة النسخ واللصق من إكسيل في الصفحة الرئيسية
        function handleBulkInput() {
            const raw = document.getElementById('home-bulk').value;
            const lines = raw.split('\n').filter(l => l.trim() !== '');
            
            lines.forEach(line => {
                const parts = line.split('\t'); // التقسيم بـ Tab (لصق إكسيل)
                const code = parts[0].trim().toUpperCase();
                const qty = parseFloat(parts[1]);

                if (code && !isNaN(qty)) {
                    orderQuantities[code] = qty;
                }
            });
            updateHomeSearch();
        }

        // 2. تصدير إكسيل احترافي (شيت لكل قسم)
        function exportToExcel() {
            const wb = XLSX.utils.book_new();
            
            CATS.forEach(cat => {
                if (inventory[cat] && inventory[cat].length > 0) {
                    const wsData = inventory[cat].map(item => ({ "الكود": item.code, "الرصيد": item.base }));
                    const ws = XLSX.utils.json_to_sheet(wsData);
                    XLSX.utils.book_append_sheet(wb, ws, `قسم ${cat}`);
                }
            });

            XLSX.writeFile(wb, `Diamond_Plast_Inventory_${new Date().toLocaleDateString()}.xlsx`);
            showToast("تم تصدير الإكسيل بنجاح");
        }

        // 3. استيراد من إكسيل وتحديث الرصيد
        function importFromExcel(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, {header: 1});

                jsonData.forEach((row, index) => {
                    if (index === 0) return; // تخطي الهيدر
                    const code = row[0]?.toString().toUpperCase().trim();
                    const qty = parseFloat(row[1]);
                    if (code && !isNaN(qty)) {
                        invAction('add', code, qty);
                    }
                });
                renderSheets();
                showToast("تم استيراد وتحديث البيانات بنجاح");
            };
            reader.readAsArrayBuffer(file);
        }

        // --- باقي دوال الموقع الأصلية مع تعديلات طفيفة ---

        function updateOrderQty(code, qty) {
            orderQuantities[code] = parseFloat(qty) || 0;
            calculateGrandTotal();
        }

        function calculateGrandTotal() {
            let totalWeightGm = 0;
            const codes = Object.keys(orderQuantities);
            codes.forEach(c => {
                const qty = orderQuantities[c];
                const unitWeight = weightDatabase[c] || 400;
                totalWeightGm += (qty * unitWeight);
            });
            document.getElementById('grand-total-weight').innerText = (totalWeightGm / 1000).toFixed(3);
        }

        function updateHomeSearch() {
            const raw = document.getElementById('home-bulk').value.toUpperCase();
            const codes = [...new Set(raw.split('\n').map(l => l.split('\t')[0].trim()).filter(l => l !== ''))];
            const res = document.getElementById('home-results');
            res.innerHTML = '';

            codes.forEach(c => {
                const info = find(c);
                const unitWeight = weightDatabase[c] || 400; 
                const qty = orderQuantities[c] || 0;

                const div = document.createElement('div');
                div.className = "p-6 bg-slate-50 rounded-3xl border border-slate-100 flex flex-col gap-4";
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="text-xl font-black">${c}</div>
                            <div class="text-[10px] font-bold text-slate-400">الرصيد: ${info ? info.item.base : 0}</div>
                        </div>
                    </div>
                    <input type="number" value="${qty}" oninput="updateOrderQty('${c}', this.value)" class="w-full bg-white p-3 rounded-xl border-none font-black outline-none focus:ring-2 focus:ring-blue-400">
                `;
                res.appendChild(div);
            });
            calculateGrandTotal();
        }

        function renderSheets() {
            const tabs = document.getElementById('sheet-tabs');
            tabs.innerHTML = CATS.map(c => `
                <button onclick="currentTab='${c}'; renderSheets()" class="px-8 py-3 rounded-2xl font-black ${currentTab === c ? 'bg-slate-900 text-white' : 'bg-white text-slate-400'}">${c}</button>
            `).join('');
            
            const body = document.getElementById('sheet-body');
            body.innerHTML = (inventory[currentTab]?.length > 0) ? inventory[currentTab].map(item => `
                <tr class="border-b border-slate-50">
                    <td class="p-6 font-black text-center">${item.code}</td>
                    <td class="p-6 text-center font-bold text-blue-600">${item.base}</td>
                    <td class="p-6 text-center">
                        <button onclick="deleteCode('${item.code}')" class="text-red-500">🗑️</button>
                    </td>
                </tr>
            `).join('') : `<tr><td colspan="3" class="p-10 text-center text-slate-300">لا توجد بيانات</td></tr>`;
        }

        function deleteCode(c) {
            if(confirm(`حذف ${c}؟`)) {
                for(let cat in inventory) inventory[cat] = inventory[cat].filter(x => x.code !== c);
                save(); renderSheets();
            }
        }

        function save() { localStorage.setItem('dp_v4_inv', JSON.stringify(inventory)); }

        function showToast(m, t='success') {
            const el = document.getElementById('toast');
            el.innerText = m;
            el.className = `fixed bottom-10 left-10 transition-all duration-500 z-[100] px-8 py-4 rounded-2xl shadow-2xl font-black text-white ${t === 'success' ? 'bg-slate-900' : 'bg-red-600'} translate-y-0 opacity-100`;
            setTimeout(() => { el.classList.add('translate-y-20'); el.classList.remove('opacity-100'); }, 3000);
        }

        window.onload = () => showPage('home');
    </script>
</body>
</html>
