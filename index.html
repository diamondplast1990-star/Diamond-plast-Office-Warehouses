<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Plast - نظام إدارة المخزن السحابي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; color: #334155; }
        .nav-btn.active { background: #1e293b; color: white; transform: translateY(-2px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .log-entry { border-right: 4px solid #e2e8f0; transition: all 0.3s; }
        .log-entry:hover { border-right-color: #0f172a; background: #f8fafc; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg">DP</div>
                <div>
                    <h1 class="text-xl font-black leading-none">Diamond Plast</h1>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">المخزن السحابي المشترك</span>
                </div>
            </div>
            <div class="flex bg-slate-100 p-1.5 rounded-2xl gap-2">
                <button onclick="showPage('home')" id="btn-home" class="nav-btn active px-8 py-2.5 rounded-xl font-black text-sm transition-all shadow-lg">الرئيسية</button>
                <button onclick="showPage('sheets')" id="btn-sheets" class="nav-btn px-8 py-2.5 rounded-xl font-black text-sm text-slate-500 transition-all">المستودع</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div id="page-home" class="space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <div class="lg:col-span-8 space-y-6">
                    <div class="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100 flex flex-col">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-2xl font-black flex items-center gap-2"><span>🔍</span> تجهيز الطلبية</h3>
                            <div class="bg-blue-50 px-4 py-2 rounded-2xl border border-blue-100 text-center">
                                <span class="text-[10px] font-black text-blue-400 block uppercase">إجمالي الوزن (كجم)</span>
                                <span id="grand-total-weight" class="text-xl font-black text-blue-700">0.000</span>
                            </div>
                        </div>
                        <textarea id="home-bulk" oninput="handleBulkInput()" placeholder="أدخل الأكواد هنا.. (يمكنك لصق صفوف من إكسيل مباشرة كود + كمية)" class="w-full h-32 p-4 rounded-3xl bg-slate-50 border-none font-bold mb-6 outline-none focus:ring-2 focus:ring-slate-200 transition-all"></textarea>
                        <div id="home-results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </div>

                    <div class="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100">
                        <h3 class="text-xl font-black mb-4 flex items-center gap-2"><span>📜</span> سجل أحدث العمليات (صرف وإضافة)</h3>
                        <div id="activity-log" class="space-y-3 max-h-[400px] overflow-y-auto no-scrollbar">
                            <p class="text-slate-400 text-center py-10 italic">لا توجد عمليات مسجلة حالياً</p>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-white p-6 rounded-[2rem] shadow-md border border-slate-100">
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">اسم المسؤول عن العملية</label>
                        <input type="text" id="user-name" placeholder="مثال: أحمد محمد" class="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold outline-none focus:ring-2 focus:ring-blue-400">
                    </div>

                    <div class="bg-slate-900 text-white rounded-[2.5rem] p-8 shadow-xl">
                        <h3 class="font-black text-xl mb-4 flex items-center gap-2"><span>📥</span> إضافة رصيد</h3>
                        <div class="space-y-3">
                            <input type="text" id="add-c" placeholder="كود المنتج" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none">
                            <input type="number" id="add-q" placeholder="الكمية" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none">
                            <button onclick="invAction('add')" class="w-full bg-white text-black p-4 rounded-2xl font-black hover:bg-slate-100 shadow-lg transition-all active:scale-95">تحديث الرصيد</button>
                        </div>
                    </div>

                    <div class="bg-red-600 text-white rounded-[2.5rem] p-8 shadow-xl">
                        <h3 class="font-black text-xl mb-4 flex items-center gap-2"><span>📤</span> صرف رصيد</h3>
                        <div class="space-y-3">
                            <input type="text" id="sub-c" placeholder="كود المنتج" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none">
                            <input type="number" id="sub-q" placeholder="الكمية" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none">
                            <button onclick="invAction('sub')" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black hover:bg-black shadow-lg transition-all active:scale-95">خصم الرصيد</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-sheets" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                <div id="sheet-tabs" class="flex gap-2 overflow-x-auto p-2 no-scrollbar w-full md:w-auto"></div>
                <div class="flex gap-2">
                    <button onclick="exportToExcel()" class="bg-emerald-600 text-white px-6 py-3 rounded-2xl font-black text-sm shadow-lg hover:bg-emerald-700 transition-all flex items-center gap-2">
                        <span>📊</span> تصدير Excel
                    </button>
                    <label class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-sm shadow-lg hover:bg-blue-700 transition-all cursor-pointer flex items-center gap-2">
                        <span>📥</span> استيراد Excel
                        <input type="file" id="import-excel" class="hidden" accept=".xlsx, .xls" onchange="importFromExcel(event)">
                    </label>
                </div>
            </div>
            <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-xs font-black uppercase tracking-widest text-center">
                            <th class="p-6">الكود</th>
                            <th class="p-6">الرصيد المتاح</th>
                            <th class="p-6">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="sheet-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-10 translate-y-20 opacity-0 transition-all duration-500 z-[100] bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl font-black"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // إعدادات فايربيز الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCgcTyvyFsEf0GZYZ6wnGD5qvJfWVMrs50",
            authDomain: "diamond-plast.firebaseapp.com",
            databaseURL: "https://diamond-plast-default-rtdb.firebaseio.com",
            projectId: "diamond-plast",
            storageBucket: "diamond-plast.firebasestorage.app",
            messagingSenderId: "446249745271",
            appId: "1:446249745271:web:7d552933aa9ba54e3fbf72",
            measurementId: "G-7KP796ZMJ9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const invRef = ref(db, 'inventory');
        const logsRef = ref(db, 'logs');

        // الأقسام المعدلة حسب طلبك
        const CATS = ['T', 'S', 'C', 'G', 'R', 'E', 'Y&'];
        const weightDatabase = { "T-7000": 379, "T-7001": 406, "S-4018": 394, "C-5001": 466, "G-8000": 542 };

        window.inventory = {};
        let orderQuantities = {};
        window.currentTab = 'T';

        // الاستماع للبيانات (المخزن + السجلات)
        onValue(invRef, (snapshot) => {
            window.inventory = snapshot.val() || {};
            CATS.forEach(c => { if(!window.inventory[c]) window.inventory[c] = []; });
            renderSheets();
            updateHomeSearch();
        });

        onValue(logsRef, (snapshot) => {
            const logs = snapshot.val();
            renderLogs(logs);
        });

        window.save = function() {
            set(invRef, window.inventory);
        };

        window.logActivity = function(type, code, qty, cat) {
            const userName = document.getElementById('user-name').value || "غير معرف";
            const newLog = {
                date: new Date().toLocaleString('ar-EG'),
                type: type === 'add' ? 'إضافة' : 'صرف',
                code: code,
                qty: qty,
                cat: cat,
                user: userName
            };
            push(logsRef, newLog);
        };

        window.showPage = function(p) {
            ['home', 'sheets'].forEach(page => {
                document.getElementById(`page-${page}`).classList.toggle('hidden', page !== p);
                const btn = document.getElementById(`btn-${page}`);
                if(btn) btn.className = (page === p) ? 'nav-btn active px-8 py-2.5 rounded-xl font-black text-sm shadow-lg' : 'nav-btn px-8 py-2.5 rounded-xl font-black text-sm text-slate-500 transition-all';
            });
            if(p === 'sheets') renderSheets();
        };

        window.find = function(c) {
            for(let cat in window.inventory) {
                const i = window.inventory[cat].find(x => x.code === c);
                if(i) return { item: i, cat };
            }
            return null;
        };

        window.invAction = function(type, codeParam = null, qtyParam = null) {
            const c = (codeParam || document.getElementById(`${type === 'add' ? 'add' : 'sub'}-c`).value).toUpperCase().trim();
            const q = parseFloat(qtyParam || document.getElementById(`${type === 'add' ? 'add' : 'sub'}-q`).value);
            
            if(!c || isNaN(q)) return showToast("يرجى إدخال الكود والكمية", "error");

            let info = window.find(c);
            let targetCat = "";

            if(info) {
                targetCat = info.cat;
                if(type === 'sub' && info.item.base < q) return showToast(`الرصيد غير كافٍ في قسم (${targetCat})`, "error");
                info.item.base += (type === 'add' ? q : -q);
            } else {
                if(type === 'sub') return showToast("الكود غير موجود للخصم", "error");
                targetCat = CATS.includes(c.charAt(0)) ? c.charAt(0) : 'Y&';
                window.inventory[targetCat].push({ code: c, base: q });
            }

            window.save();
            window.logActivity(type, c, q, targetCat);
            
            if(!codeParam) {
                document.getElementById(`${type === 'add' ? 'add' : 'sub'}-c`).value = '';
                document.getElementById(`${type === 'add' ? 'add' : 'sub'}-q`).value = '';
                showToast(`تم ${type === 'add' ? 'الإضافة إلى' : 'الخصم من'} قسم (${targetCat}) بنجاح`);
            }
        };

        window.handleBulkInput = function() {
            const raw = document.getElementById('home-bulk').value;
            const lines = raw.split('\n').filter(l => l.trim() !== '');
            lines.forEach(line => {
                const parts = line.split('\t');
                const code = parts[0]?.trim().toUpperCase();
                const qty = parseFloat(parts[1]);
                if (code && !isNaN(qty)) orderQuantities[code] = qty;
            });
            updateHomeSearch();
        };

        function renderLogs(logs) {
            const logContainer = document.getElementById('activity-log');
            if(!logs) return;
            const sortedLogs = Object.values(logs).reverse().slice(0, 20); // عرض آخر 20 عملية
            logContainer.innerHTML = sortedLogs.map(l => `
                <div class="log-entry p-4 rounded-2xl bg-white border border-slate-50 shadow-sm flex flex-col md:flex-row justify-between items-center gap-2">
                    <div class="flex items-center gap-3">
                        <span class="${l.type === 'إضافة' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'} px-3 py-1 rounded-full text-[10px] font-black">${l.type}</span>
                        <div class="font-black text-slate-800">${l.code}</div>
                        <div class="text-blue-600 font-bold">${l.qty} قطعة</div>
                    </div>
                    <div class="flex items-center gap-4 text-[11px] font-bold text-slate-400">
                        <span>قسم: ${l.cat}</span>
                        <span>بواسطة: ${l.user}</span>
                        <span>${l.date}</span>
                    </div>
                </div>
            `).join('');
        }

        window.updateOrderQty = function(code, qty) {
            orderQuantities[code] = parseFloat(qty) || 0;
            let totalWeightGm = 0;
            Object.keys(orderQuantities).forEach(c => {
                totalWeightGm += (orderQuantities[c] * (weightDatabase[c] || 400));
            });
            document.getElementById('grand-total-weight').innerText = (totalWeightGm / 1000).toFixed(3);
        };

        window.updateHomeSearch = function() {
            const raw = document.getElementById('home-bulk').value.toUpperCase();
            const codes = [...new Set(raw.split('\n').map(l => l.split('\t')[0].trim()).filter(l => l !== ''))];
            const res = document.getElementById('home-results');
            res.innerHTML = '';
            codes.forEach(c => {
                const info = window.find(c);
                const qty = orderQuantities[c] || 0;
                const div = document.createElement('div');
                div.className = "p-6 bg-slate-50 rounded-3xl border border-slate-100";
                div.innerHTML = `<div class="font-black">${c} (رصيد: ${info?.item.base || 0})</div>
                                 <input type="number" value="${qty}" oninput="updateOrderQty('${c}', this.value)" class="w-full mt-2 p-2 rounded-xl border-none outline-none font-black text-blue-600">`;
                res.appendChild(div);
            });
        };

        window.renderSheets = function() {
            const tabs = document.getElementById('sheet-tabs');
            tabs.innerHTML = CATS.map(c => `<button onclick="window.currentTab='${c}'; renderSheets()" class="px-8 py-3 rounded-xl font-black ${window.currentTab === c ? 'bg-black text-white shadow-lg' : 'bg-white text-slate-400 hover:bg-slate-50'} transition-all">${c === 'Y&' ? 'Y&' : c}</button>`).join('');
            const body = document.getElementById('sheet-body');
            body.innerHTML = (window.inventory[window.currentTab]?.length > 0) ? window.inventory[window.currentTab].map(item => `
                <tr class="border-b hover:bg-slate-50"><td class="p-6 text-center font-black text-lg">${item.code}</td><td class="p-6 text-center text-blue-600 font-bold text-lg">${item.base}</td>
                <td class="p-6 text-center"><button onclick="deleteCode('${item.code}')" class="text-red-300 hover:text-red-600 transition-colors">🗑️</button></td></tr>`).join('') : '<tr><td colspan="3" class="p-20 text-center text-slate-300 italic font-bold">لا توجد بيانات مسجلة</td></tr>';
        };

        window.deleteCode = function(c) {
            if(confirm(`حذف الكود ${c} نهائياً؟`)) {
                for(let cat in window.inventory) window.inventory[cat] = window.inventory[cat].filter(x => x.code !== c);
                window.save();
            }
        };

        window.exportToExcel = function() {
            const wb = XLSX.utils.book_new();
            CATS.forEach(cat => {
                if (window.inventory[cat]?.length > 0) {
                    const wsData = window.inventory[cat].map(item => ({ "الكود": item.code, "الرصيد": item.base }));
                    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(wsData), cat);
                }
            });
            XLSX.writeFile(wb, "Diamond_Plast_Inventory.xlsx");
        };

        window.importFromExcel = function(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                jsonData.forEach((row, idx) => {
                    if (idx === 0) return;
                    const code = row[0]?.toString().toUpperCase().trim();
                    const qty = parseFloat(row[1]);
                    if (code && !isNaN(qty)) window.invAction('add', code, qty);
                });
                showToast("تم استيراد البيانات وتحديثها");
            };
            reader.readAsArrayBuffer(file);
        };

        function showToast(m, t='success') {
            const el = document.getElementById('toast');
            el.innerText = m;
            el.className = `fixed bottom-10 left-10 transition-all duration-500 z-[100] px-8 py-4 rounded-2xl shadow-2xl font-black text-white ${t === 'success' ? 'bg-slate-900' : 'bg-red-600'} translate-y-0 opacity-100`;
            setTimeout(() => { el.classList.add('translate-y-20'); el.classList.remove('opacity-100'); }, 3000);
        }

        window.showPage('home');
    </script>
</body>
</html>
