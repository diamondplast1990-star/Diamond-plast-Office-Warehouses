<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Plast - Smart Inventory Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; color: #334155; margin: 0; }
        .nav-btn.active { background: #1e293b; color: white; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .uiverse-btn-red { transition: all 0.2s; background-color: #dc2626; border-bottom: 4px solid #991b1b; }
        .uiverse-btn-red:hover { brightness: 110%; transform: translateY(-1px); border-bottom-width: 6px; }
        .uiverse-btn-red:active { border-bottom-width: 2px; transform: translateY(2px); }

        .uiverse-btn-green { transition: all 0.2s; background-color: #059669; border-bottom: 4px solid #064e3b; }
        .uiverse-btn-green:hover { brightness: 110%; transform: translateY(-1px); border-bottom-width: 6px; }
        .uiverse-btn-green:active { border-bottom-width: 2px; transform: translateY(2px); }

        .uiverse-btn-slate { transition: all 0.2s; background-color: #f8fafc; border-bottom: 4px solid #cbd5e1; color: #1e293b; }
        .uiverse-btn-slate:active { border-bottom-width: 2px; transform: translateY(2px); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://i.ibb.co/pBTm0m4/Screenshot-2026-04-12-134935.png" alt="Diamond Plast" class="h-16 w-auto object-contain">
                <h1 class="text-xl font-black hidden md:block">Diamond Plast</h1>
            </div>
            <div class="flex bg-slate-100 p-1.5 rounded-2xl gap-1">
                <button onclick="showPage('home')" id="btn-home" class="nav-btn active px-4 md:px-8 py-2.5 rounded-xl font-black text-xs">الرئيسية</button>
                <button onclick="showPage('sheets')" id="btn-sheets" class="nav-btn px-4 md:px-8 py-2.5 rounded-xl font-black text-xs text-slate-500">المستودع</button>
                <button onclick="showPage('weights')" id="btn-weights" class="nav-btn px-4 md:px-8 py-2.5 rounded-xl font-black text-xs text-slate-500">الأوزان</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div id="page-home" class="space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-8 space-y-6">
                    <div class="bg-white rounded-[2.5rem] p-8 shadow-xl border">
                        <h3 class="text-2xl font-black mb-6 italic underline decoration-blue-500">🔍 تجهيز الطلبية</h3>
                        <textarea id="home-bulk" oninput="handleBulkInput()" placeholder="أدخل الأكواد هنا (مثال: 7000 500)..." class="w-full h-32 p-4 rounded-3xl bg-slate-50 border-none font-bold mb-4 outline-none focus:ring-2 focus:ring-slate-200 shadow-inner"></textarea>
                        
                        <div id="home-results" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6"></div>
                        
                        <div class="flex gap-4 items-center mb-6">
                            <div class="bg-blue-50 p-4 rounded-2xl flex-1 text-center border"><span class="block text-[10px] font-black text-blue-400">العدد الكلي</span><span id="total-items-count" class="text-xl font-black">0</span></div>
                            <div class="bg-emerald-50 p-4 rounded-2xl flex-1 text-center border"><span class="block text-[10px] font-black text-emerald-400">الوزن (كجم)</span><span id="grand-total-weight" class="text-xl font-black">0.000</span></div>
                        </div>
                        
                        <div id="bulk-actions" class="hidden grid grid-cols-2 gap-6">
                            <button id="bulk-sub-btn" onclick="processBulkAction('sub')" class="uiverse-btn-red text-white p-5 rounded-2xl font-black text-lg shadow-xl">📤 صرف الطلبية</button>
                            <button onclick="processBulkAction('add')" class="uiverse-btn-green text-white p-5 rounded-2xl font-black text-lg shadow-xl">📥 إرجاع الطلبية</button>
                        </div>
                    </div>

                    <div class="bg-white rounded-[2.5rem] p-8 shadow-xl border">
                        <h3 class="text-xl font-black mb-4">📜 سجل أحداث العمليات</h3>
                        <div id="activity-log" class="space-y-3 max-h-[400px] overflow-y-auto no-scrollbar"></div>
                    </div>
                </div>

                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-white p-6 rounded-[2rem] shadow-md border">
                        <input type="text" id="user-name" placeholder="اسم المسؤول" class="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold outline-none ring-2 ring-red-100">
                    </div>
                    
                    <div class="bg-slate-900 text-white rounded-[2.5rem] p-8 shadow-xl">
                        <h3 class="font-black text-xl mb-4 italic">📥 إضافة منفردة</h3>
                        <input type="text" id="add-c" placeholder="كود الصنف" class="w-full p-4 rounded-2xl bg-white/10 border-none mb-3 font-bold outline-none uppercase">
                        <input type="number" id="add-q" placeholder="الكمية" class="w-full p-4 rounded-2xl bg-white/10 border-none mb-3 font-bold outline-none">
                        <button onclick="invAction('add')" class="uiverse-btn-slate w-full p-4 rounded-2xl font-black">تحديث الرصيد</button>
                    </div>

                    <div class="bg-red-600 text-white rounded-[2.5rem] p-8 shadow-xl">
                        <h3 class="font-black text-xl mb-4 italic">📤 صرف منفرد</h3>
                        <input type="text" id="sub-c" placeholder="كود الصنف" class="w-full p-4 rounded-2xl bg-white/10 border-none mb-3 font-bold outline-none uppercase">
                        <input type="number" id="sub-q" placeholder="الكمية" class="w-full p-4 rounded-2xl bg-white/10 border-none mb-3 font-bold outline-none">
                        <button onclick="invAction('sub')" class="uiverse-btn-slate w-full p-4 rounded-2xl font-black text-slate-900">خصم الرصيد</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-sheets" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm flex flex-wrap gap-4 items-center justify-between border">
                <div id="sheet-tabs" class="flex gap-2 overflow-x-auto p-1 no-scrollbar flex-1"></div>
                <div class="flex gap-2 flex-wrap">
                    <button onclick="toggleLowStockFilter()" id="filter-low-btn" class="bg-amber-100 text-amber-700 px-4 py-2 rounded-xl font-bold text-xs border">النواقص (1-0)</button>
                    <label class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-xs cursor-pointer">استيراد <input type="file" class="hidden" accept=".xlsx, .xls" onchange="importInventoryExcel(event)"></label>
                    <button onclick="exportInventoryExcel('flat')" class="bg-emerald-600 text-white px-4 py-2 rounded-xl font-bold text-xs">تصدير (قائمة)</button>
                    <button onclick="exportInventoryExcel('tabs')" class="bg-slate-800 text-white px-4 py-2 rounded-xl font-bold text-xs">تصدير (فئات)</button>
                </div>
            </div>
            <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border">
                <table class="w-full text-right border-collapse">
                    <thead><tr class="bg-slate-50 border-b"><th class="p-6 text-center">الكود</th><th class="p-6 text-center">الرصيد</th><th class="p-6 text-center">حذف</th></tr></thead>
                    <tbody id="sheet-body"></tbody>
                </table>
            </div>
        </div>

        <div id="page-weights" class="hidden space-y-6">
            <div class="bg-white rounded-[2.5rem] p-8 shadow-xl border">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-2xl font-black italic">⚖️ إدارة أوزان القوالب</h3>
                    <div class="flex gap-2">
                        <label class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-xs cursor-pointer">استيراد <input type="file" class="hidden" accept=".xlsx, .xls" onchange="importWeightsExcel(event)"></label>
                        <button onclick="exportWeightsExcel()" class="bg-slate-800 text-white px-5 py-2.5 rounded-xl font-bold text-xs">تصدير</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 p-6 bg-slate-50 rounded-3xl mb-8">
                    <input type="text" id="w-code" placeholder="كود القالب" class="p-4 rounded-2xl border-none font-bold outline-none uppercase shadow-sm">
                    <input type="number" id="w-val" placeholder="الوزن (جرام)" class="p-4 rounded-2xl border-none font-bold outline-none shadow-sm">
                    <button onclick="saveWeight()" class="uiverse-btn-slate md:col-span-2 p-4 rounded-2xl font-black">حفظ الوزن</button>
                </div>
                <div id="weights-list" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-500 z-[100] bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl font-black text-center min-w-[350px] border border-white/20"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgcTyvyFsEf0GZYZ6wnGD5qvJfWVMrs50",
            authDomain: "diamond-plast.firebaseapp.com",
            databaseURL: "https://diamond-plast-default-rtdb.firebaseio.com",
            projectId: "diamond-plast",
            storageBucket: "diamond-plast.firebasestorage.app",
            messagingSenderId: "446249745271",
            appId: "1:446249745271:web:7d552933aa9ba54e3fbf72"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.inventory = {}; window.weights = {}; window.currentTab = 'T'; window.showLowStock = false;
        let orderItems = {}; const CATEGORIES = ['T', 'S', 'C', 'G', 'R', 'E', 'Y&', 'Others'];

        window.showPage = (p) => {
            ['home', 'sheets', 'weights'].forEach(id => {
                document.getElementById('page-'+id).classList.toggle('hidden', id !== p);
                document.getElementById('btn-'+id).className = (id === p) ? 'nav-btn active px-4 md:px-8 py-2.5 rounded-xl font-black text-xs' : 'nav-btn px-4 md:px-8 py-2.5 rounded-xl font-black text-xs text-slate-500';
            });
        };

        // وظيفة البحث الذكي المحسنة (للحصول على بيانات الصنف كاملة)
        function getSmartStock(code) {
            const cleanCode = code.toUpperCase().trim();
            const numericPart = cleanCode.replace(/\D/g, "");
            
            for (let cat in window.inventory) {
                let itm = window.inventory[cat].find(x => x.code === cleanCode || x.code.replace(/\D/g, "") === numericPart);
                if (itm) return { ...itm, cat };
            }
            return null;
        }

        function findItemCategory(code) {
            const stock = getSmartStock(code);
            if(stock) return stock.cat;
            const cleanCode = code.toUpperCase().trim();
            const firstChar = cleanCode.charAt(0);
            if (CATEGORIES.includes(firstChar)) return firstChar;
            if (!isNaN(firstChar) && firstChar !== "") return 'T'; 
            return 'Others';
        }

        function showSmartToast(msg) {
            const el = document.getElementById('toast'); el.innerText = msg;
            el.className = `fixed bottom-10 left-1/2 -translate-x-1/2 transition-all duration-500 z-[100] bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl font-black translate-y-0 opacity-100`;
            setTimeout(() => { el.classList.add('translate-y-20'); el.classList.remove('opacity-100'); }, 4000);
        }

        window.processBulkAction = (type) => {
            const user = document.getElementById('user-name').value.trim(); if(!user) return alert("اكتب اسم المسؤول");
            
            // منع الصرف لو فيه عجز
            if(type === 'sub') {
                let hasError = false;
                Object.entries(orderItems).forEach(([code, qty]) => {
                    const stock = getSmartStock(code);
                    if(!stock || stock.base < qty) hasError = true;
                });
                if(hasError) return alert("لا يمكن صرف الطلبية: يوجد أصناف رصيدها غير كافٍ أو غير موجودة!");
            }

            Object.entries(orderItems).forEach(([code, qty]) => {
                const targetCat = findItemCategory(code); if (!window.inventory[targetCat]) window.inventory[targetCat] = [];
                let itm = window.inventory[targetCat].find(x => x.code === code.toUpperCase() || x.code.replace(/\D/g,"") === code.replace(/\D/g,""));
                if (itm) itm.base += (type === 'add' ? qty : -qty);
                else if (type === 'add') window.inventory[targetCat].push({ code: code.toUpperCase(), base: qty });
                push(ref(db, 'logs'), { date: new Date().toLocaleString('ar-EG'), type: type==='add'?'إرجاع كلي':'صرف كلي', code: itm ? itm.code : code, qty: qty, user: user });
            });
            set(ref(db, 'inventory'), window.inventory).then(() => {
                document.getElementById('home-bulk').value = ''; orderItems = {}; window.updateHomeUI();
                showSmartToast(type === 'add' ? "تم إرجاع الطلبية بنجاح ✅" : "تم صرف الطلبية بنجاح 🚀");
            });
        };

        window.invAction = (type) => {
            const user = document.getElementById('user-name').value.trim(); if(!user) return alert("اكتب اسم المسؤول");
            const c = document.getElementById(type+'-c').value.toUpperCase().trim(); const q = parseFloat(document.getElementById(type+'-q').value);
            if(!c || isNaN(q)) return;
            const stock = getSmartStock(c);
            if(type === 'sub' && (!stock || stock.base < q)) return alert("الرصيد غير كافٍ للصرف!");

            const targetCat = findItemCategory(c); if (!window.inventory[targetCat]) window.inventory[targetCat] = [];
            let itm = window.inventory[targetCat].find(x => x.code === c || x.code.replace(/\D/g,"") === c.replace(/\D/g,""));
            if (itm) itm.base += (type === 'add' ? q : -q);
            else if (type === 'add') window.inventory[targetCat].push({ code: c, base: q });
            set(ref(db, 'inventory'), window.inventory);
            push(ref(db, 'logs'), { date: new Date().toLocaleString('ar-EG'), type: type==='add'?'إضافة':'صرف', code: c, qty: q, user: user });
            showSmartToast(`${type==='add'?'إضافة':'صرف'} (${q}) لـ (${c}) في [${targetCat}]`);
            document.getElementById(type+'-c').value=''; document.getElementById(type+'-q').value='';
        };

        window.handleBulkInput = () => {
            const lines = document.getElementById('home-bulk').value.trim().split('\n'); orderItems = {};
            lines.forEach(l => { const p = l.split(/\t|\s+/); let c = p[0]?.toUpperCase() || ""; let q = parseFloat(p[1]); if(c && !isNaN(q)) orderItems[c] = (orderItems[c] || 0) + q; });
            window.updateHomeUI();
        };

        // التحديث الذكي لواجهة التجهيز (ربط الوزن بالرصيد بالتنبيهات)
        window.updateHomeUI = () => {
            const res = document.getElementById('home-results'); res.innerHTML = ''; 
            let tW = 0, tQ = 0, hasInventoryError = false;

            Object.entries(orderItems).forEach(([c, q]) => {
                const stock = getSmartStock(c);
                const currentStock = stock ? stock.base : 0;
                const isShortage = currentStock < q;
                if(isShortage || !stock) hasInventoryError = true;

                // حساب الوزن
                let w = window.weights[c]; 
                if(w===undefined) { 
                    const n = c.replace(/\D/g, ""); 
                    const k = Object.keys(window.weights).find(x=>x.replace(/\D/g,"")===n); 
                    w = k ? window.weights[k] : 0; 
                }
                tW += (q*w); tQ += q;

                // تصميم الكارد التنبيهي
                const bgColor = !stock ? 'bg-amber-50 border-amber-200' : (isShortage ? 'bg-red-50 border-red-200' : 'bg-white border-slate-100 shadow-sm');
                const statusMsg = !stock ? '<span class="text-[9px] text-amber-600 block">غير مسجل بالمخزن</span>' : (isShortage ? `<span class="text-[9px] text-red-600 block">عجز: ${q - currentStock} قطعة</span>` : '<span class="text-[9px] text-emerald-600 block">متوفر ✅</span>');

                res.innerHTML += `
                    <div class="p-4 rounded-2xl border flex justify-between items-center ${bgColor}">
                        <div>
                            <span class="font-black block text-sm">${stock ? stock.code : c}</span>
                            <span class="text-[10px] text-slate-400 font-bold">وزن: ${w}ج | رصيد: ${currentStock}</span>
                            ${statusMsg}
                        </div>
                        <div class="text-left">
                            <span class="text-blue-600 font-black text-lg block">${q}</span>
                            <span class="text-[9px] font-bold text-slate-400 uppercase">الطلب</span>
                        </div>
                    </div>`;
            });

            document.getElementById('grand-total-weight').innerText = (tW/1000).toFixed(3);
            document.getElementById('total-items-count').innerText = tQ;
            document.getElementById('bulk-actions').classList.toggle('hidden', tQ===0);
            
            // تعطيل زر الصرف لو فيه أخطاء
            document.getElementById('bulk-sub-btn').style.opacity = hasInventoryError ? "0.5" : "1";
            document.getElementById('bulk-sub-btn').style.cursor = hasInventoryError ? "not-allowed" : "pointer";
        };

        window.saveWeight = () => {
            const c = document.getElementById('w-code').value.trim().toUpperCase(); const v = parseFloat(document.getElementById('w-val').value);
            if(!c || isNaN(v)) return; window.weights[c] = v;
            set(ref(db, 'custom_weights'), window.weights).then(() => { document.getElementById('w-code').value=''; document.getElementById('w-val').value=''; });
        };

        window.exportWeightsExcel = () => {
            if (Object.keys(window.weights).length === 0) return alert("لا توجد أوزان للتصدير");
            const data = Object.entries(window.weights).map(([c, v]) => ({ "الكود": c, "الوزن (جرام)": v }));
            XLSX.writeFile(XLSX.utils.book_append_sheet(XLSX.utils.book_new(), XLSX.utils.json_to_sheet(data), "الأوزان"), "Weights.xlsx");
        };

        window.exportInventoryExcel = (mode) => {
            const wb = XLSX.utils.book_new();
            if(mode === 'tabs') { CATEGORIES.forEach(cat => { const d = (window.inventory[cat] || []).map(i => ({ "الكود": i.code, "الرصيد": i.base })); if(d.length > 0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(d), cat); }); }
            else { let f = []; CATEGORIES.forEach(cat => (window.inventory[cat] || []).forEach(i => f.push({ "الفئة": cat, "الكود": i.code, "الرصيد": i.base }))); XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(f), "المخزون"); }
            XLSX.writeFile(wb, "Diamond_Inventory.xlsx");
        };

        window.importInventoryExcel = (e) => {
            const reader = new FileReader(); reader.onload = (evt) => {
                const data = XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, { type: 'binary' }).Sheets[XLSX.read(evt.target.result, { type: 'binary' }).SheetNames[0]]);
                data.forEach(row => { const c = row["الكود"]?.toString().toUpperCase(); const q = parseFloat(row["الرصيد"] || 0); if(c) { 
                    const targetCat = findItemCategory(c); if(!window.inventory[targetCat]) window.inventory[targetCat]=[];
                    let idx = window.inventory[targetCat].findIndex(x=>x.code===c || x.code.replace(/\D/g,"")===c.replace(/\D/g,""));
                    if(idx>-1) window.inventory[targetCat][idx].base = q; else window.inventory[targetCat].push({code:c, base:q});
                }});
                set(ref(db, 'inventory'), window.inventory);
            }; reader.readAsBinaryString(e.target.files[0]);
        };

        onValue(ref(db, 'inventory'), s => { window.inventory = s.val() || {}; window.renderSheets(); window.updateHomeUI(); });
        onValue(ref(db, 'custom_weights'), s => { window.weights = s.val() || {}; window.renderWeights(); window.updateHomeUI(); });
        onValue(ref(db, 'logs'), s => {
            const data = s.val() ? Object.values(s.val()).reverse().slice(0, 15) : [];
            document.getElementById('activity-log').innerHTML = data.map(l => `<div class="p-3 bg-slate-50 flex justify-between rounded-xl border-r-4 border-blue-500 text-[11px] mb-2 shadow-sm"><span><b>${l.type}</b>: ${l.code} (${l.qty})</span><span>${l.user}</span><span class="text-slate-400">${l.date}</span></div>`).join('');
        });

        window.renderSheets = () => {
            document.getElementById('sheet-tabs').innerHTML = CATEGORIES.map(c => `<button onclick="window.currentTab='${c}'; window.renderSheets()" class="px-4 py-2 rounded-xl font-black text-xs ${window.currentTab === c ? 'bg-black text-white' : 'text-slate-400'}">${c}</button>`).join('');
            let items = window.inventory[window.currentTab] || []; if(window.showLowStock) items = items.filter(i => i.base <= 1);
            document.getElementById('sheet-body').innerHTML = items.map(i => `<tr class="border-b"><td class="p-6 text-center font-black ${i.base<=1?'text-red-600':''}">${i.code}</td><td class="p-6 text-center font-bold text-blue-600">${i.base}</td><td class="p-6 text-center"><button onclick="deleteItem('${i.code}')" class="opacity-30 hover:opacity-100">🗑️</button></td></tr>`).join('');
        };

        window.renderWeights = () => { document.getElementById('weights-list').innerHTML = Object.entries(window.weights).sort().map(([c, v]) => `<div class="bg-white p-4 rounded-2xl border flex justify-between shadow-sm"><div><div class="text-[10px] text-slate-400 font-bold">${c}</div><div class="font-black text-blue-600">${v}ج</div></div><button onclick="deleteWeight('${c}')" class="text-red-200">🗑️</button></div>`).join(''); };
        window.deleteItem = (c) => { if(confirm("حذف؟")) { for(let cat in window.inventory) window.inventory[cat] = window.inventory[cat].filter(x => x.code !== c); set(ref(db, 'inventory'), window.inventory); }};
        window.deleteWeight = (c) => { if(confirm("حذف؟")) { delete window.weights[c]; set(ref(db, 'custom_weights'), window.weights); }};
        window.toggleLowStockFilter = () => { window.showLowStock = !window.showLowStock; document.getElementById('filter-low-btn').innerText = window.showLowStock ? "إظهار الكل" : "النواقص (1-0)"; window.renderSheets(); };
    </script>
</body>
</html>
