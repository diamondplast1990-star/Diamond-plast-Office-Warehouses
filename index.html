<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Plast - نظام إدارة المخزن المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; color: #334155; }
        .nav-btn.active { background: #1e293b; color: white; transform: translateY(-2px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .tab-content { transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Navigation -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg">DP</div>
                <div>
                    <h1 class="text-xl font-black leading-none">Diamond Plast</h1>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">الموقع الرسمي - GitHub Edition</span>
                </div>
            </div>
            <div class="flex bg-slate-100 p-1.5 rounded-2xl gap-2">
                <button onclick="showPage('home')" id="btn-home" class="nav-btn active px-6 py-2.5 rounded-xl font-black text-sm transition-all shadow-lg">تجهيز طلبية</button>
                <button onclick="showPage('sheets')" id="btn-sheets" class="nav-btn px-6 py-2.5 rounded-xl font-black text-sm text-slate-500 transition-all">المستودع</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">

        <!-- PAGE: HOME -->
        <div id="page-home" class="space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <!-- Search & Order Preparation -->
                <div class="lg:col-span-8 bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100 flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-2xl font-black flex items-center gap-2"><span>🔍</span> تجهيز الطلبية والبحث</h3>
                        <div class="flex gap-4">
                            <div class="bg-blue-50 px-4 py-2 rounded-2xl border border-blue-100 text-center">
                                <span class="text-[10px] font-black text-blue-400 block uppercase">إجمالي الوزن (كجم)</span>
                                <span id="grand-total-weight" class="text-xl font-black text-blue-700">0.000</span>
                            </div>
                            <div class="bg-slate-50 px-4 py-2 rounded-2xl border border-slate-100 text-center">
                                <span class="text-[10px] font-black text-slate-400 block uppercase">إجمالي القوالب</span>
                                <input type="number" id="manual-total-count" value="0" class="w-16 bg-transparent text-xl font-black text-slate-700 text-center outline-none">
                            </div>
                        </div>
                    </div>
                    
                    <textarea id="home-bulk" oninput="updateHomeSearch()" placeholder="أدخل الأكواد هنا (كود في كل سطر).. مثال:&#10;T-7000&#10;S-4018" class="w-full h-32 p-4 rounded-3xl bg-slate-50 border-none font-bold mb-6 outline-none focus:ring-2 focus:ring-slate-200 transition-all"></textarea>
                    
                    <div id="home-results" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Results injected here -->
                    </div>
                </div>

                <!-- Operations Panel -->
                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-slate-900 text-white rounded-[2.5rem] p-8 shadow-xl">
                        <h3 class="font-black text-xl mb-4 flex items-center gap-2"><span>📥</span> توريد / إضافة</h3>
                        <div class="space-y-3">
                            <input type="text" id="add-c" placeholder="كود المنتج" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none">
                            <input type="number" id="add-q" placeholder="الكمية" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none">
                            <button onclick="invAction('add')" class="w-full bg-white text-black p-4 rounded-2xl font-black hover:bg-slate-100 transition-all active:scale-95">إضافة للرصيد</button>
                        </div>
                    </div>

                    <div class="bg-red-600 text-white rounded-[2.5rem] p-8 shadow-xl">
                        <h3 class="font-black text-xl mb-4 flex items-center gap-2"><span>📤</span> صرف / خصم</h3>
                        <div class="space-y-3">
                            <input type="text" id="sub-c" placeholder="كود المنتج" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none">
                            <input type="number" id="sub-q" placeholder="الكمية" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-bold outline-none">
                            <button onclick="invAction('sub')" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black hover:bg-black transition-all active:scale-95">خصم من الرصيد</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- PAGE: SHEETS -->
        <div id="page-sheets" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                <div id="sheet-tabs" class="flex gap-2 overflow-x-auto p-2 no-scrollbar w-full md:w-auto"></div>
                
                <div class="flex gap-2 w-full md:w-auto">
                    <!-- أزرار الاستيراد والتصدير -->
                    <button onclick="exportToExcel()" class="flex-1 md:flex-none bg-emerald-600 text-white px-5 py-3 rounded-2xl font-black text-sm shadow-lg hover:bg-emerald-700 transition-all flex items-center justify-center gap-2">
                        <span>📊</span> تصدير Excel
                    </button>
                    <label class="flex-1 md:flex-none bg-blue-600 text-white px-5 py-3 rounded-2xl font-black text-sm shadow-lg hover:bg-blue-700 transition-all cursor-pointer flex items-center justify-center gap-2">
                        <span>📂</span> استيراد Excel
                        <input type="file" id="import-excel" class="hidden" accept=".xlsx, .xls" onchange="importFromExcel(event)">
                    </label>
                    <button onclick="exportBackup()" class="w-12 h-12 bg-slate-200 text-slate-600 rounded-2xl flex items-center justify-center hover:bg-slate-300 transition-all" title="نسخة احتياطية JSON">
                        ⚙️
                    </button>
                </div>
            </div>
            
            <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100">
                <div class="overflow-x-auto">
                    <table class="w-full text-right border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 text-xs font-black uppercase tracking-widest border-b">
                                <th class="p-6 text-center">الكود</th>
                                <th class="p-6 text-center">الرصيد المتاح</th>
                                <th class="p-6 text-center">الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="sheet-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-10 translate-y-20 opacity-0 transition-all duration-500 z-[100] bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl font-black"></div>

    <script>
        // الأقسام الأساسية
        const CATS = ['T', 'S', 'C', 'G', 'R', 'E', 'YG', 'YT', 'YE', 'YR', 'YC', 'YS', 'MG'];
        
        // أوزان افتراضية (يمكن استبدالها عبر الاستيراد)
        let weightDatabase = JSON.parse(localStorage.getItem('dp_weights')) || {
            "T-7000": 379, "T-7001": 406, "S-4018": 394, "C-5001": 466, "G-8000": 542
        };

        let inventory = JSON.parse(localStorage.getItem('dp_v4_inv')) || {};
        let orderQuantities = {}; 
        let currentTab = 'T';

        // تهيئة المخزن إذا كان فارغاً
        if (Object.keys(inventory).length === 0) CATS.forEach(c => inventory[c] = []);

        function showPage(p) {
            document.getElementById('page-home').classList.toggle('hidden', p !== 'home');
            document.getElementById('page-sheets').classList.toggle('hidden', p !== 'sheets');
            
            document.getElementById('btn-home').className = (p === 'home') ? 'nav-btn active px-6 py-2.5 rounded-xl font-black text-sm transition-all shadow-lg' : 'nav-btn px-6 py-2.5 rounded-xl font-black text-sm text-slate-500 transition-all';
            document.getElementById('btn-sheets').className = (p === 'sheets') ? 'nav-btn active px-6 py-2.5 rounded-xl font-black text-sm transition-all shadow-lg' : 'nav-btn px-6 py-2.5 rounded-xl font-black text-sm text-slate-500 transition-all';
            
            if(p === 'sheets') renderSheets();
        }

        function findItem(c) {
            for(let cat in inventory) {
                const i = inventory[cat].find(x => x.code === c);
                if(i) return { ...i, cat };
            }
            return null;
        }

        function invAction(type) {
            const prefix = type === 'add' ? 'add' : 'sub';
            const c = document.getElementById(`${prefix}-c`).value.toUpperCase().trim();
            const q = parseFloat(document.getElementById(`${prefix}-q`).value);
            
            if(!c || isNaN(q)) return showToast("يرجى إدخال الكود والكمية", "error");

            let info = findItem(c);
            if(info) {
                let item = inventory[info.cat].find(x => x.code === c);
                if(type === 'sub' && item.base < q) return showToast("الرصيد غير كافٍ!", "error");
                item.base += (type === 'add' ? q : -q);
            } else {
                if(type === 'sub') return showToast("الكود غير موجود للخصم", "error");
                let targetCat = CATS.find(catPrefix => c.startsWith(catPrefix)) || 'MG';
                inventory[targetCat].push({ code: c, base: q });
            }
            
            saveData();
            document.getElementById(`${prefix}-c`).value = '';
            document.getElementById(`${prefix}-q`).value = '';
            showToast(type === 'add' ? "تمت الإضافة بنجاح" : "تم الخصم بنجاح");
            updateHomeSearch();
        }

        function updateOrderQty(code, qty) {
            orderQuantities[code] = parseFloat(qty) || 0;
            calculateGrandTotal();
        }

        function calculateGrandTotal() {
            let totalWeightGm = 0;
            let totalItemsCount = 0;
            const codesInSearch = document.getElementById('home-bulk').value.toUpperCase().split('\n').map(l=>l.trim()).filter(l=>l!=='');

            codesInSearch.forEach(c => {
                const qty = orderQuantities[c] || 0;
                const weightPerUnit = weightDatabase[c] || 400; 
                totalWeightGm += (qty * weightPerUnit);
                totalItemsCount += qty;
            });

            document.getElementById('grand-total-weight').innerText = (totalWeightGm / 1000).toFixed(3);
            const manualTotal = document.getElementById('manual-total-count');
            if (totalItemsCount > 0) manualTotal.value = totalItemsCount;
        }

        function updateHomeSearch() {
            const raw = document.getElementById('home-bulk').value.toUpperCase();
            const codes = [...new Set(raw.split('\n').map(l => l.trim()).filter(l => l !== ''))];
            const res = document.getElementById('home-results');
            res.innerHTML = '';

            codes.forEach(c => {
                const info = findItem(c);
                const unitWeight = weightDatabase[c] || 400; 
                if(!orderQuantities[c]) orderQuantities[c] = 0;

                const div = document.createElement('div');
                div.className = "p-6 bg-slate-50 rounded-3xl border border-slate-100 flex flex-col gap-4";
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="text-xl font-black text-slate-800">${c}</div>
                            <div class="text-[10px] font-bold text-slate-400">الرصيد: ${info ? info.base : 0}</div>
                        </div>
                        <input type="number" placeholder="وزن" onchange="updateWeightDb('${c}', this.value)" value="${unitWeight}" class="w-16 bg-white border border-slate-200 rounded-lg text-center text-[10px] font-bold outline-none">
                    </div>
                    <div class="flex items-center gap-4 bg-white/50 p-3 rounded-2xl border border-slate-100">
                        <input type="number" value="${orderQuantities[c]}" oninput="updateOrderQty('${c}', this.value)" placeholder="الكمية" class="w-full bg-white p-2 rounded-xl border-none font-black outline-none">
                        <div class="text-left font-black text-blue-600">${((orderQuantities[c] * unitWeight) / 1000).toFixed(3)}kg</div>
                    </div>
                `;
                res.appendChild(div);
            });
            calculateGrandTotal();
        }

        function updateWeightDb(code, weight) {
            weightDatabase[code] = parseFloat(weight) || 400;
            localStorage.setItem('dp_weights', JSON.stringify(weightDatabase));
            calculateGrandTotal();
        }

        function renderSheets() {
            const tabs = document.getElementById('sheet-tabs');
            tabs.innerHTML = CATS.map(c => `
                <button onclick="currentTab='${c}'; renderSheets()" 
                        class="px-8 py-3 rounded-2xl font-black whitespace-nowrap transition-all ${currentTab === c ? 'bg-slate-900 text-white shadow-xl scale-105' : 'bg-white text-slate-400 hover:bg-slate-50'}">
                    ${c}
                </button>
            `).join('');
            
            const body = document.getElementById('sheet-body');
            const data = inventory[currentTab] || [];
            body.innerHTML = data.length > 0 ? data.map(item => `
                <tr class="border-b border-slate-50 hover:bg-slate-50/50">
                    <td class="p-6 font-black text-center text-lg">${item.code}</td>
                    <td class="p-6 text-center font-bold text-blue-600 text-lg">${item.base}</td>
                    <td class="p-6 text-center">
                        <button onclick="deleteCode('${item.code}')" class="text-red-400 hover:text-red-600 p-2">🗑️</button>
                    </td>
                </tr>
            `).join('') : `<tr><td colspan="3" class="p-10 text-center text-slate-300 font-bold">القسم فارغ</td></tr>`;
        }

        function deleteCode(c) {
            if(confirm(`حذف ${c}؟`)) {
                for(let cat in inventory) inventory[cat] = inventory[cat].filter(x => x.code !== c);
                saveData();
                renderSheets();
            }
        }

        // --- ميزات Excel ---

        function exportToExcel() {
            let fullList = [];
            for(let cat in inventory) {
                inventory[cat].forEach(item => {
                    fullList.push({
                        "القسم": cat,
                        "الكود": item.code,
                        "الرصيد": item.base,
                        "الوزن الافتراضي": weightDatabase[item.code] || 400
                    });
                });
            }
            
            const ws = XLSX.utils.json_to_sheet(fullList);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, `Diamond_Plast_Stock_${new Date().toLocaleDateString()}.xlsx`);
            showToast("تم تصدير ملف Excel");
        }

        function importFromExcel(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet);
                
                if(confirm("هل تريد مسح البيانات الحالية واستبدالها ببيانات الملف؟")) {
                    CATS.forEach(c => inventory[c] = []); // Reset
                    json.forEach(row => {
                        const code = row["الكود"] || row["code"];
                        const base = parseFloat(row["الرصيد"] || row["balance"] || 0);
                        const weight = parseFloat(row["الوزن الافتراضي"] || row["weight"] || 400);
                        const cat = row["القسم"] || row["category"] || (CATS.find(cp => code.startsWith(cp)) || 'MG');
                        
                        if(code) {
                            if(!inventory[cat]) inventory[cat] = [];
                            inventory[cat].push({ code, base });
                            if(weight) weightDatabase[code] = weight;
                        }
                    });
                    saveData();
                    localStorage.setItem('dp_weights', JSON.stringify(weightDatabase));
                    renderSheets();
                    showToast("تم استيراد البيانات بنجاح");
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function exportBackup() {
            const blob = new Blob([JSON.stringify({ inventory, weightDatabase })], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `DiamondPlast_Backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function saveData() {
            localStorage.setItem('dp_v4_inv', JSON.stringify(inventory));
        }

        function showToast(m, t='success') {
            const el = document.getElementById('toast');
            el.innerText = m;
            el.className = `fixed bottom-10 left-10 transition-all duration-500 z-[100] px-8 py-4 rounded-2xl shadow-2xl font-black text-white ${t === 'success' ? 'bg-slate-900' : 'bg-red-600'} translate-y-0 opacity-100`;
            setTimeout(() => { el.classList.add('translate-y-20'); el.classList.remove('opacity-100'); }, 3000);
        }

        window.onload = () => { showPage('home'); };
    </script>
</body>
</html>
