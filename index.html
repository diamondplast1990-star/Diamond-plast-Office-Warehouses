<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCgcTyvyFsEf0GZYZ6wnGD5qvJfWVMrs50",
    authDomain: "diamond-plast.firebaseapp.com",
    databaseURL: "https://diamond-plast-default-rtdb.firebaseio.com",
    projectId: "diamond-plast",
    storageBucket: "diamond-plast.firebasestorage.app",
    messagingSenderId: "446249745271",
    appId: "1:446249745271:web:7d552933aa9ba54e3fbf72"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const MASTER_WEIGHTS = {
    "7000": 379,
    "7001": 406,
    "7003": 384,
    "7005": 416,
    "7007": 419,
    "7009": 369,
    "7010": 368,
    "7011": 372,
    "1020": 500,
    "1038": 346,
    "8000": 542
};

window.inventory = {};
window.customWeights = {};

let orderItems = {};

window.currentTab = 'T';

const CATS = ['T', 'S', 'C', 'G', 'R', 'E', 'Y&'];

window.showPage = (p) => {

    ['home', 'sheets', 'weights'].forEach(pg => {

        document.getElementById(`page-${pg}`).classList.toggle('hidden', pg !== p);

        document.getElementById(`btn-${pg}`).className =
            (pg === p)
            ? 'nav-btn active px-4 md:px-8 py-2.5 rounded-xl font-black transition-all shadow-lg'
            : 'nav-btn px-4 md:px-8 py-2.5 rounded-xl font-black text-slate-500 transition-all';

    });

};

window.handleBulkInput = () => {

    const lines = document.getElementById('home-bulk').value.trim().split('\n');

    orderItems = {};

    lines.forEach(l => {

        const p = l.split(/\t|\s+/);

        const c = p[0]?.toUpperCase();

        const q = parseFloat(p[1]);

        if(c && !isNaN(q)) {

            orderItems[c] = q;

        }

    });

    window.updateHomeSearch();

};

window.updateHomeSearch = () => {

    const res = document.getElementById('home-results');

    res.innerHTML = '';

    let totalW = 0;

    let totalQ = 0;

    Object.keys(orderItems).forEach(c => {

        const info = window.find(c);

        const qty = orderItems[c];

        const w = window.getWeight(c);

        totalW += (qty * w);

        totalQ += qty;

        res.innerHTML += `
        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex justify-between font-black">
            <span>${c} (رصيد: ${info?.item.base || 0})</span>
            <span class="text-blue-600">${qty} قطعة</span>
        </div>
        `;

    });

    document.getElementById('grand-total-weight').innerText =
        (totalW / 1000).toFixed(3);

    document.getElementById('total-items-count').innerText = totalQ;

    document.getElementById('dispatch-btn').classList.toggle(
        'hidden',
        Object.keys(orderItems).length === 0
    );

};

window.processFullDispatch = () => {

    if(!confirm("صرف الطلبية بالكامل؟")) return;

    const user =
        document.getElementById('user-name').value || "غير معروف";

    Object.keys(orderItems).forEach(c => {

        const q = orderItems[c];

        const info = window.find(c);

        if(info) {

            info.item.base -= q;

            push(ref(db, 'logs'), {
                date: new Date().toLocaleString('ar-EG'),
                type: 'صرف كلي',
                code: c,
                qty: q,
                user: user
            });

        }

    });

    set(ref(db, 'inventory'), window.inventory);

    document.getElementById('home-bulk').value = '';

    orderItems = {};

    window.updateHomeSearch();

    showToast("تم الصرف بنجاح");

};

window.invAction = (type) => {

    const c =
        document.getElementById(`${type}-c`).value
        .toUpperCase()
        .trim();

    const q = parseFloat(
        document.getElementById(`${type}-q`).value
    );

    const user =
        document.getElementById('user-name').value || "غير معروف";

    if(!c || isNaN(q)) return;

    let info = window.find(c);

    if(info) {

        info.item.base += (type === 'add' ? q : -q);

    } else if(type === 'add') {

        let cat =
            CATS.includes(c.charAt(0))
            ? c.charAt(0)
            : 'Y&';

        if(!window.inventory[cat]) {

            window.inventory[cat] = [];

        }

        window.inventory[cat].push({
            code: c,
            base: q
        });

    }

    set(ref(db, 'inventory'), window.inventory);

    push(ref(db, 'logs'), {
        date: new Date().toLocaleString('ar-EG'),
        type: type === 'add' ? 'إضافة' : 'صرف',
        code: c,
        qty: q,
        user: user
    });

    document.getElementById(`${type}-c`).value = '';

    document.getElementById(`${type}-q`).value = '';

};

window.renderSheets = () => {

    const tabs = document.getElementById('sheet-tabs');

    tabs.innerHTML = CATS.map(c => `
        <button
            onclick="window.currentTab='${c}'; window.renderSheets()"
            class="px-6 py-2 rounded-xl font-black ${
                window.currentTab === c
                ? 'bg-black text-white'
                : 'bg-white text-slate-400'
            }">
            ${c}
        </button>
    `).join('');

    const body = document.getElementById('sheet-body');

    const items = window.inventory[window.currentTab] || [];

    body.innerHTML = items.map(i => `

        <tr class="border-b">

            <td class="p-6 text-center font-black ${
                i.base <= 0
                ? 'text-red-600 bg-red-50'
                : ''
            }">
                ${i.code}
            </td>

            <td class="p-6 text-center font-bold ${
                i.base <= 0
                ? 'text-red-600'
                : 'text-blue-600'
            }">
                ${i.base}
            </td>

            <td class="p-6 text-center">
                <button onclick="window.deleteCode('${i.code}')">
                    🗑️
                </button>
            </td>

        </tr>

    `).join('');

};

window.getWeight = (code) => {

    let pure = code.replace(/[^0-9]/g, '');

    return (
        window.customWeights[code]
        || MASTER_WEIGHTS[pure]
        || 0
    );

};

window.find = c => {

    for(let cat in window.inventory) {

        const i =
            window.inventory[cat]
            .find(x => x.code === c);

        if(i) {

            return {
                item: i,
                cat
            };

        }

    }

    return null;

};

window.deleteCode = c => {

    if(confirm("حذف؟")) {

        for(let cat in window.inventory) {

            window.inventory[cat] =
                window.inventory[cat]
                .filter(x => x.code !== c);

        }

        set(ref(db, 'inventory'), window.inventory);

    }

};

window.updateWeightManually = () => {

    const code =
        document.getElementById('new-weight-code')
        .value
        .trim()
        .toUpperCase();

    const weight = parseFloat(
        document.getElementById('new-weight-val').value
    );

    if(!code || isNaN(weight)) {

        showToast("أدخل الكود والوزن");

        return;

    }

    window.customWeights[code] = weight;

    set(ref(db, 'custom_weights'), window.customWeights);

    document.getElementById('new-weight-code').value = '';

    document.getElementById('new-weight-val').value = '';

    renderWeights();

    showToast("تم حفظ الوزن");

};

window.renderWeights = () => {

    const box = document.getElementById('weights-list');

    const allWeights = {
        ...MASTER_WEIGHTS,
        ...window.customWeights
    };

    box.innerHTML = Object.keys(allWeights)
    .sort()
    .map(code => `

        <div class="bg-slate-50 rounded-2xl p-4 text-center border">

            <div class="font-black text-lg mb-2">
                ${code}
            </div>

            <div class="text-blue-600 font-black mb-3">
                ${allWeights[code]} جم
            </div>

            <button
                onclick="editWeight('${code}','${allWeights[code]}')"
                class="bg-black text-white px-4 py-2 rounded-xl text-sm font-black">
                تعديل
            </button>

        </div>

    `).join('');

};

window.editWeight = (code, weight) => {

    document.getElementById('new-weight-code').value = code;

    document.getElementById('new-weight-val').value = weight;

    window.showPage('weights');

};

window.exportToExcel = () => {

    const wb = XLSX.utils.book_new();

    Object.keys(window.inventory).forEach(cat => {

        const data =
            (window.inventory[cat] || []).map(i => ({
                "الكود": i.code,
                "الرصيد": i.base
            }));

        const ws = XLSX.utils.json_to_sheet(data);

        XLSX.utils.book_append_sheet(wb, ws, cat);

    });

    XLSX.writeFile(
        wb,
        "Diamond-Plast-Inventory.xlsx"
    );

};

window.importFromExcel = (event) => {

    const file = event.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {

        const data = new Uint8Array(e.target.result);

        const workbook = XLSX.read(data, {
            type: 'array'
        });

        let importedInventory = {};

        workbook.SheetNames.forEach(sheetName => {

            const ws = workbook.Sheets[sheetName];

            const json =
                XLSX.utils.sheet_to_json(ws);

            importedInventory[sheetName] =
                json.map(r => ({
                    code: String(r["الكود"] || '')
                    .toUpperCase(),

                    base: Number(r["الرصيد"] || 0)
                }));

        });

        window.inventory = importedInventory;

        set(ref(db, 'inventory'), window.inventory);

        showToast("تم استيراد الملف");

    };

    reader.readAsArrayBuffer(file);

};

function renderLogs(logs) {

    const cont =
        document.getElementById('activity-log');

    if(!logs) return;

    cont.innerHTML =
        Object.values(logs)
        .reverse()
        .slice(0, 15)
        .map(l => `

        <div class="log-entry p-3 bg-white text-[11px] flex justify-between shadow-sm rounded-lg">

            <span>
                <b>${l.type}</b>
                ${l.code}
                (${l.qty})
            </span>

            <span class="text-slate-500 font-bold">
                ${l.user}
            </span>

            <span class="text-slate-400">
                ${l.date || ''}
            </span>

        </div>

    `).join('');

}

onValue(ref(db, 'inventory'), s => {

    window.inventory = s.val() || {};

    window.renderSheets();

    window.updateHomeSearch();

});

onValue(ref(db, 'logs'), s => {

    renderLogs(s.val());

});

onValue(ref(db, 'custom_weights'), s => {

    window.customWeights = s.val() || {};

    renderWeights();

});

function showToast(m) {

    const el = document.getElementById('toast');

    el.innerText = m;

    el.className =
        `fixed bottom-10 left-10 transition-all duration-500 z-[100] px-8 py-4 rounded-2xl shadow-2xl font-black text-white bg-slate-900 translate-y-0 opacity-100`;

    setTimeout(() => {

        el.classList.add('translate-y-20');

        el.classList.remove('opacity-100');

    }, 3000);

}
</script>
